services:
  postgres:
    image: postgres:16-alpine
    container_name: cosmatics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cosmatics
      POSTGRES_PASSWORD: cosmatics_dev
      POSTGRES_DB: cosmatics_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cosmatics-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
